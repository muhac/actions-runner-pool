services:
  gharp:
    build: .
    image: gharp:dev
    container_name: gharp
    restart: unless-stopped
    env_file: .env
    # RUNNER_COMMAND lives here, not in .env, because .env values can't span
    # lines. YAML's `>-` folds the multi-line block into a single line by
    # collapsing newlines into spaces — JSON tolerates the extra whitespace.
    # `environment:` overrides any same-named key from `env_file:`.
    environment:
      RUNNER_COMMAND: >-
        [
          "docker","run","--rm","-d",
          "--name","{{.ContainerName}}",
          "--network=host",
          "-v","/var/run/docker.sock:/var/run/docker.sock",
          "-v","/tmp/gharp/{{.ContainerName}}:/_work",
          "-e","REPO_URL={{.RepoURL}}",
          "-e","RUNNER_TOKEN={{.RegistrationToken}}",
          "-e","RUNNER_NAME={{.RunnerName}}",
          "-e","LABELS={{.Labels}}",
          "-e","RUNNER_WORKDIR=/_work",
          "-e","EPHEMERAL=1",
          "--log-opt","max-size=10m",
          "--log-opt","max-file=3",
          "{{.Image}}"
        ]
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gharp-data:/data
      # Shared work-dir tree. gharp creates per-runner subdirs under
      # /tmp/gharp/<container-name>/_work and passes the SAME path as a
      # `-v` mount source to `docker run`. The mount source is interpreted
      # by the host docker daemon, so the path must exist on the host —
      # bind-mounting /tmp/gharp into gharp itself keeps host and
      # container views identical.
      - /tmp/gharp:/tmp/gharp

volumes:
  gharp-data:
