name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: smoke test
        run: go test -tags smoke -count=1 ./cmd/gharp

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: integration test
        run: go test -tags integration -count=1 ./cmd/gharp

  fuzz:
    name: Fuzz Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: fuzz webhook handler
        run: go test -fuzz=FuzzWebhook_Handler -fuzztime=30s ./internal/httpapi/handlers/

  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    # Browsers come prebaked in the image, pulled from mcr.microsoft.com, so
    # the run never hits cdn.playwright.dev (which stalled for hours on every
    # download). Keep the tag in sync with @playwright/test in tests/package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install Node dependencies
        working-directory: tests
        run: npm ci

      # The prebaked browser lives at the path the installed @playwright/test
      # expects only when the image tag matches the package version. Check it
      # locally (no network) so a tag/package drift fails fast here with a clear
      # message, instead of the test step trying to reach cdn.playwright.dev.
      - name: Verify Playwright browsers match the image
        working-directory: tests
        run: |
          ver=$(node -p "require('@playwright/test/package.json').version")
          if exe=$(node -e "console.log(require('playwright-core').chromium.executablePath())") && [ -x "$exe" ]; then
            echo "Chromium present: $exe"
          else
            echo "::error::Chromium for @playwright/test $ver is missing (resolved: ${exe:-<unresolved>})."
            echo "::error::The container image tag in .github/workflows/ci.yml is out of sync with tests/package.json — bump mcr.microsoft.com/playwright to v$ver-noble and retry."
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
